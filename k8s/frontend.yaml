apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: perfstack
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: k3d-perfstack-registry:5000/library/perfstack-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: perfstack
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
