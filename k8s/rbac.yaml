apiVersion: v1
kind: ServiceAccount
metadata:
  name: k6-runner-sa
  namespace: perfstack
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: k6-job-manager
  namespace: perfstack
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log", "configmaps"]
    verbs: ["create", "get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-k6-binding
  namespace: perfstack
subjects:
  - kind: ServiceAccount
    name: k6-runner-sa
    namespace: perfstack
roleRef:
  kind: Role
  name: k6-job-manager
  apiGroup: rbac.authorization.k8s.io
