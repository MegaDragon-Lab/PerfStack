# ──────────────────────────────────────────────────────────────────────────────
# secrets.example.yaml  —  Structure reference ONLY. No real values here.
#
# To create the actual secret in the cluster, run:
#   bash k8s/create-secrets.sh
#
# DO NOT copy this file as secrets.yaml with real values — it would be
# committed to git. Use the shell script instead.
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: gsa-shared-secrets
  namespace: perfstack
type: Opaque
stringData:
  # Shared key between the GSA Platform Suite backend and any deployed app
  # that needs to call internal backend endpoints (e.g. dmp-cost-simulation).
  # Generate with: openssl rand -hex 32
  INTERNAL_API_KEY: "REPLACE_WITH_OUTPUT_OF_create-secrets.sh"
