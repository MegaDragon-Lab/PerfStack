apiVersion: apps/v1
kind: Deployment
metadata:
  name: influxdb
  namespace: perfstack
  labels:
    app: influxdb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: influxdb
  template:
    metadata:
      labels:
        app: influxdb
    spec:
      containers:
        - name: influxdb
          image: influxdb:1.8
          ports:
            - containerPort: 8086
          env:
            - name: INFLUXDB_DB
              value: k6
            - name: INFLUXDB_ADMIN_ENABLED
              value: "true"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: influxdb
  namespace: perfstack
spec:
  selector:
    app: influxdb
  ports:
    - port: 8086
      targetPort: 8086
